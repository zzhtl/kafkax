<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="kafka" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Kafka logo - simplified streaming nodes -->
  <!-- Central node -->
  <circle cx="128" cy="118" r="18" fill="url(#kafka)" opacity="0.95"/>
  <circle cx="128" cy="118" r="10" fill="url(#bg)"/>
  <!-- Top-right node -->
  <circle cx="172" cy="72" r="14" fill="url(#kafka)" opacity="0.9"/>
  <circle cx="172" cy="72" r="8" fill="url(#bg)"/>
  <!-- Bottom-right node -->
  <circle cx="172" cy="164" r="14" fill="url(#kafka)" opacity="0.9"/>
  <circle cx="172" cy="164" r="8" fill="url(#bg)"/>
  <!-- Left-top node -->
  <circle cx="84" cy="82" r="12" fill="url(#kafka)" opacity="0.85"/>
  <circle cx="84" cy="82" r="7" fill="url(#bg)"/>
  <!-- Left-bottom node -->
  <circle cx="84" cy="154" r="12" fill="url(#kafka)" opacity="0.85"/>
  <circle cx="84" cy="154" r="7" fill="url(#bg)"/>
  <!-- Connections -->
  <line x1="142" y1="108" x2="162" y2="80" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
  <line x1="142" y1="128" x2="162" y2="156" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
  <line x1="114" y1="108" x2="94" y2="88" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
  <line x1="114" y1="128" x2="94" y2="148" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
  <!-- Streaming arrows (data flow) -->
  <path d="M50 95 L72 85" stroke="url(#accent)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M50 160 L72 150" stroke="url(#accent)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M184 68 L206 58" stroke="url(#accent)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M184 168 L206 178" stroke="url(#accent)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <!-- App name -->
  <text x="128" y="218" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="30" fill="url(#accent)" letter-spacing="3">KafkaX</text>
</svg>
